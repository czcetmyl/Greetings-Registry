*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#7F77DD;--purple-dark:#534AB7;--purple-light:#EEEDFE;
  --pink:#D4537E;--pink-dark:#993556;--pink-light:#FBEAF0;
  --gold:#EF9F27;--gold-dark:#BA7517;--gold-light:#FAEEDA;
  --teal:#1D9E75;--teal-dark:#0F6E56;--teal-light:#E1F5EE;
  --blue:#378ADD;--blue-dark:#185FA5;--blue-light:#E6F1FB;
  --coral:#D85A30;--coral-dark:#993C1D;--coral-light:#FAECE7;
  --text:#1a1a2e;--text2:#4a4a6a;--text3:#9090b0;
  --bg:#faf9ff;--card:#fff;--border:#e8e6f0;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.site-header{
  background:linear-gradient(135deg,#1a1a2e 0%,#2d1b69 40%,#11998e 100%);
  padding:2.5rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden
}
.site-header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 70% 50%,rgba(212,83,126,.25) 0%,transparent 60%),
             radial-gradient(ellipse at 20% 80%,rgba(239,159,39,.2) 0%,transparent 50%);
  pointer-events:none
}
.header-cross{font-size:2rem;margin-bottom:.5rem;position:relative}
.site-header h1{
  font-family:'Playfair Display',serif;font-size:clamp(1.4rem,4vw,2.2rem);
  color:#fff;font-weight:700;position:relative;line-height:1.25
}
.site-header h1 span{color:var(--gold)}
.site-header p{color:rgba(255,255,255,.7);font-size:.85rem;margin-top:.5rem;position:relative}
.media-badge{
  display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.9);font-size:.7rem;padding:.25rem .75rem;border-radius:20px;
  margin-top:.75rem;letter-spacing:.05em;text-transform:uppercase
}

/* ── MAIN LAYOUT ── */
.container{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:.85rem 1rem;margin-bottom:1.5rem;box-shadow:0 2px 12px rgba(127,119,221,.08)
}
.toolbar-title{font-size:.8rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-right:.4rem}
.btn{
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.45rem .9rem;border-radius:8px;font-size:.8rem;font-weight:500;
  cursor:pointer;border:1.5px solid transparent;transition:.15s;white-space:nowrap
}
.btn svg{width:15px;height:15px;flex-shrink:0}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-purple:hover{background:var(--purple-dark)}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-teal:hover{background:var(--teal-dark)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn-gold:hover{background:var(--gold-dark)}
.btn-pink{background:var(--pink);color:#fff;border-color:var(--pink)}
.btn-pink:hover{background:var(--pink-dark)}
.btn-outline{background:#fff;color:var(--text2);border-color:var(--border)}
.btn-outline:hover{background:var(--bg);border-color:var(--purple)}
.btn-danger{background:#E24B4A;color:#fff;border-color:#E24B4A}
.btn-danger:hover{background:#A32D2D}
.saved-tag{
  margin-left:auto;font-size:.75rem;color:var(--teal);font-weight:500;
  opacity:0;transition:.4s;display:flex;align-items:center;gap:.3rem
}
.saved-tag.show{opacity:1}

/* ── SECTIONS GRID ── */
.sections-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}

/* ── SECTION CARD ── */
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.sec-head{
  padding:.75rem 1rem;display:flex;align-items:center;gap:.5rem
}
.sec-head-title{font-size:.95rem;font-weight:600;color:#fff;flex:1;line-height:1.2}
.sec-count{font-size:.7rem;color:rgba(255,255,255,.75);white-space:nowrap}
.sec-actions{display:flex;gap:.25rem}
.sec-icon-btn{
  background:rgba(255,255,255,.18);border:none;color:#fff;
  width:28px;height:28px;border-radius:7px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.15s
}
.sec-icon-btn:hover{background:rgba(255,255,255,.35)}
.sec-icon-btn svg{width:14px;height:14px}

/* ── ENTRIES ── */
.entries-list{padding:.4rem 0}
.entry-row{
  display:flex;align-items:center;padding:.4rem 1rem;gap:.5rem;
  transition:.12s;cursor:default
}
.entry-row:hover{background:#f7f6ff}
.e-date{
  font-size:.72rem;font-weight:600;color:var(--text3);min-width:46px;
  white-space:nowrap
}
.e-photo-thumb{
  width:32px;height:32px;border-radius:50%;object-fit:cover;
  border:2px solid var(--border);flex-shrink:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer
}
.e-photo-thumb img{width:100%;height:100%;object-fit:cover}
.e-photo-thumb.empty{background:linear-gradient(135deg,#e8e6f0,#d5d2ea);position:relative}
.e-photo-thumb.empty svg{width:16px;height:16px;color:#b0aed0}
.e-name{flex:1;font-size:.82rem;color:var(--text)}
.e-actions{display:flex;gap:.2rem;opacity:0;transition:.12s}
.entry-row:hover .e-actions{opacity:1}
.e-btn{
  background:none;border:1px solid var(--border);color:var(--text3);
  width:24px;height:24px;border-radius:5px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.12s
}
.e-btn:hover{background:#f0f0ff;color:var(--purple);border-color:var(--purple)}
.e-btn.del:hover{background:#fff0f0;color:#A32D2D;border-color:#f09595}
.e-btn.preview:hover{background:#f0fff8;color:var(--teal);border-color:var(--teal)}
.e-btn svg{width:12px;height:12px}

/* ── ADD ENTRY ROW ── */
.add-row{
  padding:.6rem 1rem;border-top:1px solid var(--border);
  display:flex;gap:.4rem;align-items:center;flex-wrap:wrap
}
.add-row input{
  font-size:.78rem;padding:.35rem .6rem;border:1px solid var(--border);
  border-radius:7px;background:var(--bg);color:var(--text);outline:none
}
.add-row input:focus{border-color:var(--purple)}
.add-row input.f-date{width:90px}
.add-row input.f-name{flex:1;min-width:80px}
.add-row-label{font-size:.7rem;color:var(--text3);font-weight:500;width:100%;margin-bottom:-.2rem}

/* ── PHOTO UPLOAD in add row ── */
.photo-upload-wrap{position:relative;width:28px;height:28px;flex-shrink:0}
.photo-upload-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-upload-btn{
  width:28px;height:28px;border-radius:50%;background:var(--purple-light);
  border:1.5px dashed var(--purple);color:var(--purple);
  display:flex;align-items:center;justify-content:center;pointer-events:none
}
.photo-upload-btn svg{width:13px;height:13px}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(20,15,50,.6);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;padding:1rem;backdrop-filter:blur(4px)
}
.modal{
  background:#fff;border-radius:20px;width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden
}
.modal-header{
  padding:1.25rem 1.25rem .75rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between
}
.modal-header h3{font-size:1rem;font-weight:600;color:var(--text)}
.modal-close{
  background:none;border:none;cursor:pointer;color:var(--text3);
  width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center
}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:1rem 1.25rem}
.modal-body label{font-size:.75rem;font-weight:600;color:var(--text3);display:block;margin-bottom:.3rem;margin-top:.75rem;text-transform:uppercase;letter-spacing:.04em}
.modal-body label:first-child{margin-top:0}
.modal-body input,.modal-body textarea{
  width:100%;padding:.55rem .75rem;border:1.5px solid var(--border);
  border-radius:9px;font-size:.88rem;color:var(--text);
  background:var(--bg);outline:none;font-family:'Inter',sans-serif
}
.modal-body input:focus,.modal-body textarea:focus{border-color:var(--purple)}
.modal-footer{padding:.75rem 1.25rem 1.25rem;display:flex;gap:.5rem;justify-content:flex-end}

/* ── PHOTO PREVIEW MODAL ── */
.preview-modal{background:#1a1a2e;border-radius:20px;width:100%;max-width:560px;overflow:hidden}
.preview-modal .modal-header{background:#1a1a2e;border-color:rgba(255,255,255,.1)}
.preview-modal .modal-header h3{color:#fff}
.preview-modal .modal-close{color:rgba(255,255,255,.6)}
.preview-modal .modal-close:hover{background:rgba(255,255,255,.1)}
.preview-img-wrap{background:#0d0d20;text-align:center;padding:1.5rem}
.preview-img-wrap img{max-width:100%;max-height:480px;object-fit:contain;border-radius:10px}
.preview-no-photo{
  padding:3rem;text-align:center;color:rgba(255,255,255,.4);font-size:.9rem
}
.preview-footer{
  background:#1a1a2e;padding:1rem 1.25rem;
  display:flex;gap:.5rem;justify-content:space-between;align-items:center;
  border-top:1px solid rgba(255,255,255,.1)
}
.preview-name{color:#fff;font-size:.9rem;font-weight:500}
.preview-date{color:rgba(255,255,255,.5);font-size:.78rem}
.upload-photo-btn{position:relative;overflow:hidden;display:inline-flex;align-items:center}
.upload-photo-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

/* ── PHOTO THUMB in list ── */
.e-photo-thumb{cursor:pointer;transition:.12s}
.e-photo-thumb:hover{transform:scale(1.1)}

/* ── SECTION COLOR BANDS ── */
.c1{background:linear-gradient(135deg,#7F77DD,#534AB7)}
.c2{background:linear-gradient(135deg,#D4537E,#993556)}
.c3{background:linear-gradient(135deg,#1D9E75,#0F6E56)}
.c4{background:linear-gradient(135deg,#EF9F27,#BA7517)}
.c5{background:linear-gradient(135deg,#378ADD,#185FA5)}
.c6{background:linear-gradient(135deg,#D85A30,#993C1D)}
.c7{background:linear-gradient(135deg,#639922,#3B6D11)}

.c15{background:linear-gradient(135deg,#BA7517,#D85A30)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;
  background:#1D9E75;color:#fff;padding:.65rem 1.1rem;
  border-radius:10px;font-size:.82rem;font-weight:500;
  opacity:0;transition:.35s;z-index:10000;pointer-events:none;
  display:flex;align-items:center;gap:.4rem;box-shadow:0 4px 20px rgba(0,0,0,.2)
}
.toast.show{opacity:1}
.toast svg{width:15px;height:15px}

/* ── SECTION EDIT PHOTO AREA ── */
.entry-photo-area{
  display:flex;align-items:center;gap:.75rem;margin-top:.25rem

.entry-photo-preview{
  width:72px;height:72px;border-radius:12px;object-fit:cover;
  border:2px solid var(--border);background:var(--bg);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0
}
.entry-photo-preview img{width:100%;height:100%;object-fit:cover}
.entry-photo-preview.empty{background:linear-gradient(135deg,#e8e6f0,#d5d2ea)}
.photo-actions{display:flex;flex-direction:column;gap:.4rem}

@media(max-width:600px){
  .sections-grid{grid-template-columns:1fr}
  .site-header{padding:1.75rem 1rem 1.25rem}
}

// ─── STATE ───
let state=null;

function uid(){return 'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function loadState(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){state=JSON.parse(raw);}
    else{state=JSON.parse(JSON.stringify(DEFAULT));}
  }catch(e){state=JSON.parse(JSON.stringify(DEFAULT));}
  render();
}

function saveState(){
  localStorage.setItem(STORE_KEY,JSON.stringify(state));
  const tag=document.getElementById('savedTag');
  tag.classList.add('show');
  setTimeout(()=>tag.classList.remove('show'),2500);
  showToast('Changes saved ✓');
}

function showToast(msg,color='#1D9E75'){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.style.background=color;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── RENDER ───
function render(){
  const grid=document.getElementById('sectionsGrid');
  grid.innerHTML='';
  state.sections.forEach((sec,si)=>{
    const col=COLORS[si%COLORS.length];
    const div=document.createElement('div');
    div.className='sec-card';
    div.id='sec-'+sec.id;
    div.innerHTML=`
      <div class="sec-head ${col}">
        <span class="sec-head-title">${esc(sec.title)}</span>
        <span class="sec-count">${sec.entries.length}</span>
        <div class="sec-actions">
          <button class="sec-icon-btn" title="Edit section title" onclick="editSection('${sec.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="sec-icon-btn" title="Remove section" onclick="confirmRemoveSection('${sec.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <div class="entries-list">
        ${sec.entries.map(e=>entryHTML(sec.id,e)).join('')}
      </div>
      <div class="add-row">
        <span class="add-row-label">Add new entry</span>
        <input class="f-date" type="text" placeholder="Date" id="nd-${sec.id}" onkeydown="if(event.key==='Enter')document.getElementById('nn-${sec.id}').focus()">
        <input class="f-name" type="text" placeholder="Name" id="nn-${sec.id}" onkeydown="if(event.key==='Enter')quickAdd('${sec.id}')">
        <div class="photo-upload-wrap" title="Upload photo">
          <input type="file" accept="image/*" onchange="setNewPhoto('${sec.id}',event)">
          <div class="photo-upload-btn" id="pb-${sec.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
        </div>
        <button class="btn btn-purple" style="padding:.35rem .7rem;font-size:.75rem" onclick="quickAdd('${sec.id}')">
          <svg style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>`;
    grid.appendChild(div);
  });
}

const newPhotos={};

function setNewPhoto(secId,evt){
  const file=evt.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    newPhotos[secId]=e.target.result;
    const pb=document.getElementById('pb-'+secId);
    pb.style.background='var(--teal-light)';
    pb.style.borderColor='var(--teal)';
    pb.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2.5" style="width:13px;height:13px"><polyline points="20 6 9 17 4 12"/></svg>`;
  };
  reader.readAsDataURL(file);
}

function entryHTML(secId,e){
  const hasPhoto=e.photo&&e.photo.length>10;
  const thumbContent=hasPhoto
    ?`<img src="${e.photo}" alt="${esc(e.name)}">`
    :`<svg viewBox="0 0 24 24" fill="none" stroke="#b0aed0" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
  return `<div class="entry-row" id="row-${e.id}">
    <span class="e-date">${esc(e.date)}</span>
    <div class="e-photo-thumb${hasPhoto?'':' empty'}" title="${hasPhoto?'View photo':'No photo yet'}" onclick="previewPhoto('${secId}','${e.id}')">${thumbContent}</div>
    <span class="e-name">${esc(e.name)}</span>
    <div class="e-actions">
      <button class="e-btn preview" title="Photo preview & upload" onclick="previewPhoto('${secId}','${e.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="e-btn" title="Edit entry" onclick="editEntry('${secId}','${e.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="e-btn del" title="Remove entry" onclick="removeEntry('${secId}','${e.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  </div>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ─── ADD ENTRY ───
function quickAdd(secId){
  const dateEl=document.getElementById('nd-'+secId);
  const nameEl=document.getElementById('nn-'+secId);
  const date=dateEl.value.trim();
  const name=nameEl.value.trim();
  if(!name){nameEl.focus();return;}
  const sec=state.sections.find(s=>s.id===secId);
  sec.entries.push({id:uid(),date:date||'—',name,photo:newPhotos[secId]||''});
  delete newPhotos[secId];
  dateEl.value='';nameEl.value='';
  saveState();render();
}

// ─── REMOVE ENTRY ───
function removeEntry(secId,entId){
  if(!confirm('Remove this entry?'))return;
  const sec=state.sections.find(s=>s.id===secId);
  sec.entries=sec.entries.filter(e=>e.id!==entId);
  saveState();render();
}

// ─── EDIT ENTRY (modal) ───
function editEntry(secId,entId){
  const sec=state.sections.find(s=>s.id===secId);
  const entry=sec.entries.find(e=>e.id===entId);
  const hasPhoto=entry.photo&&entry.photo.length>10;
  showModal(`
    <div class="modal-header">
      <h3>Edit entry</h3>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <label>Date</label>
      <input id="me-date" value="${esc(entry.date)}">
      <label>Name</label>
      <input id="me-name" value="${esc(entry.name)}">
      <label>Photo</label>
      <div class="entry-photo-area">
        <div class="entry-photo-preview${hasPhoto?'':' empty'}" id="me-preview">
          ${hasPhoto?`<img src="${entry.photo}" id="me-previewImg">`:`<svg viewBox="0 0 24 24" fill="none" stroke="#b0aed0" stroke-width="1.5" style="width:28px;height:28px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`}
        </div>
        <div class="photo-actions">
          <label class="btn btn-purple" style="cursor:pointer;font-size:.75rem;padding:.4rem .7rem">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload photo
            <input type="file" accept="image/*" style="display:none" onchange="handleEditPhoto(event,'${secId}','${entId}')">
          </label>
          ${hasPhoto?`<button class="btn btn-outline" style="font-size:.75rem;padding:.4rem .7rem" onclick="removeEntryPhoto('${secId}','${entId}')">Remove photo</button>`:''}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-purple" onclick="saveEditEntry('${secId}','${entId}')">Save changes</button>
    </div>`);
}

function handleEditPhoto(evt,secId,entId){
  const file=evt.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const sec=state.sections.find(s=>s.id===secId);
    const entry=sec.entries.find(en=>en.id===entId);
    entry.photo=e.target.result;
    const prev=document.getElementById('me-preview');
    if(prev){prev.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;prev.classList.remove('empty');}
    showToast('Photo ready — click Save changes');
  };
  reader.readAsDataURL(file);
}

function removeEntryPhoto(secId,entId){
  const sec=state.sections.find(s=>s.id===secId);
  const entry=sec.entries.find(e=>e.id===entId);
  entry.photo='';
  closeModal();editEntry(secId,entId);
}

function saveEditEntry(secId,entId){
  const sec=state.sections.find(s=>s.id===secId);
  const entry=sec.entries.find(e=>e.id===entId);
  entry.date=document.getElementById('me-date').value.trim()||entry.date;
  entry.name=document.getElementById('me-name').value.trim()||entry.name;
  closeModal();saveState();render();
}

// ─── PHOTO PREVIEW MODAL ───
function previewPhoto(secId,entId){
  const sec=state.sections.find(s=>s.id===secId);
  const entry=sec.entries.find(e=>e.id===entId);
  const hasPhoto=entry.photo&&entry.photo.length>10;
  const content=`
    <div class="preview-modal">
      <div class="modal-header">
        <h3 style="color:#fff">📸 ${esc(entry.name)}</h3>
        <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2.5" style="width:16px;height:16px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="preview-img-wrap">
        ${hasPhoto
          ?`<img src="${entry.photo}" id="previewHDImg" alt="${esc(entry.name)}">`
          :`<div class="preview-no-photo">No photo uploaded yet.<br>Use the button below to add one.</div>`}
      </div>
      <div class="preview-footer">
        <div>
          <div class="preview-name">${esc(entry.name)}</div>
          <div class="preview-date">${esc(entry.date)}</div>
        </div>
        <div style="display:flex;gap:.5rem;align-items:center">
          ${hasPhoto?`<button class="btn btn-teal upload-photo-btn" onclick="downloadPhoto('${entId}','${esc(entry.name)}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download HD
          </button>`:''}
          <label class="btn btn-purple upload-photo-btn" style="cursor:pointer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            ${hasPhoto?'Replace photo':'Upload photo'}
            <input type="file" accept="image/*" style="display:none" onchange="uploadPhotoFromPreview('${secId}','${entId}',event)">
          </label>
        </div>
      </div>
    </div>`;
  showModal(content,true);
}

function uploadPhotoFromPreview(secId,entId,evt){
  const file=evt.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const sec=state.sections.find(s=>s.id===secId);
    const entry=sec.entries.find(en=>en.id===entId);
    entry.photo=e.target.result;
    saveState();
    closeModal();
    setTimeout(()=>previewPhoto(secId,entId),100);
    showToast('Photo uploaded!');
    render();
  };
  reader.readAsDataURL(file);
}

function downloadPhoto(entId,name){
  const sec=state.sections.find(s=>s.entries.some(e=>e.id===entId));
  if(!sec)return;
  const entry=sec.entries.find(e=>e.id===entId);
  if(!entry||!entry.photo)return;
  const a=document.createElement('a');
  a.href=entry.photo;
  a.download=(name||'photo').replace(/[^a-z0-9]/gi,'_')+'_POB.jpg';
  a.click();
  showToast('Downloading HD photo…');
}

// ─── SECTION CRUD ───
function editSection(secId){
  const sec=state.sections.find(s=>s.id===secId);
  showModal(`
    <div class="modal-header">
      <h3>Edit section</h3>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <label>Section title</label>
      <input id="ms-title" value="${esc(sec.title)}">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-purple" onclick="saveSection('${secId}')">Save</button>
    </div>`);
}

function saveSection(secId){
  const sec=state.sections.find(s=>s.id===secId);
  const v=document.getElementById('ms-title').value.trim();
  if(v)sec.title=v;
  closeModal();saveState();render();
}

function confirmRemoveSection(secId){
  const sec=state.sections.find(s=>s.id===secId);
  showModal(`
    <div class="modal-header">
      <h3 style="color:#A32D2D">Remove section?</h3>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <p style="font-size:.88rem;color:#4a4a6a;margin-top:.5rem">Remove <strong>${esc(sec.title)}</strong> and all ${sec.entries.length} entries? This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doRemoveSection('${secId}')">Yes, remove</button>
    </div>`);
}

function doRemoveSection(secId){
  state.sections=state.sections.filter(s=>s.id!==secId);
  closeModal();saveState();render();
}

function openAddSection(){
  showModal(`
    <div class="modal-header">
      <h3>Add new section</h3>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <label>Section title</label>
      <input id="mas-title" placeholder="e.g. 🌸 Youth Group" onkeydown="if(event.key==='Enter')doAddSection()">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-purple" onclick="doAddSection()">Add section</button>
    </div>`);
  setTimeout(()=>document.getElementById('mas-title')&&document.getElementById('mas-title').focus(),50);
}

function doAddSection(){
  const title=document.getElementById('mas-title').value.trim();
  if(!title)return;
  state.sections.push({id:uid(),title,entries:[]});
  closeModal();saveState();render();
}

// ─── MODAL HELPERS ───
function showModal(html,dark=false){
  const bg=document.createElement('div');
  bg.className='modal-overlay';
  bg.id='modalOverlay';
  bg.innerHTML=`<div class="${dark?'':'modal'}">${html}</div>`;
  bg.addEventListener('click',e=>{if(e.target===bg)closeModal();});
  document.getElementById('modals').appendChild(bg);
}
function closeModal(){
  const el=document.getElementById('modalOverlay');
  if(el)el.remove();
}

// ─── EXPORT / IMPORT ───
function exportJSON(){
  const out=JSON.parse(JSON.stringify(state));
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='POB_Birthday_Greetings_Data.json';a.click();
  URL.revokeObjectURL(url);
  showToast('Data downloaded!');
}

function importJSON(evt){
  const file=evt.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data&&data.sections){
        state=data;saveState();render();
        showToast('Data imported successfully!');
      }else{showToast('Invalid file format','#E24B4A');}
    }catch{showToast('Could not read file','#E24B4A');}
  };
  reader.readAsText(file);
  evt.target.value='';
}

// ─── INIT ───
loadState();
